name: Build e Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar o build do site
        run: PORT=3000 BASE_PATH="/" pnpm --filter @workspace/calculadora-porcentagem run build

      - name: Adicionar package.json para compatibilidade com Hostinger
        run: |
          echo '{"name":"calculadora-porcentagem","version":"1.0.0","description":"Calculadora de Porcentagens","scripts":{"build":"echo already built","start":"echo static site"}}' \
            > ./artifacts/calculadora-porcentagem/dist/public/package.json

      - name: Publicar arquivos na branch "dist"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: dist
          publish_dir: ./artifacts/calculadora-porcentagem/dist/public
          force_orphan: true
